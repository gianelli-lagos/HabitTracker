name: Deploy Lambda Functions

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/lambdas/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Deploy daily_reminders
      run: |
        cd backend/lambdas/daily_reminders
        cp -r ../shared .
        cp -r ../../models .
        cp ../../database.py .
        cp -r ../../services .
        pip install -r requirements.txt -t .
        rm -rf psycopg2 psycopg2_binary*
        pip install psycopg2-binary \
          --platform manylinux2014_aarch64 \
          --target . \
          --only-binary=:all: \
          --python-version 3.11
        zip -r daily_reminders.zip .
        aws lambda update-function-code \
          --function-name daily_reminders \
          --zip-file fileb://daily_reminders.zip \
          --region us-east-2

    - name: Deploy midnight_streak_validator
      run: |
        cd backend/lambdas/midnight_streak_validator
